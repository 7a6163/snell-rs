services:
  snell:
    image: ghcr.io/7a6163/snell:${TAG:-latest}
    container_name: ${CONTAINER_NAME:-snell}
    restart: always
    ports:
      - "${PORT:-6180}:6180/tcp"
      - "${PORT:-6180}:6180/udp"
    environment:
      PSK: ${PSK:?PSK required (min 16 chars)}
      QUIC: ${QUIC:-0}
      EGRESS_INTERFACE: ${EGRESS_INTERFACE:-}
      IPV6: ${IPV6:-0}
      DNS: ${DNS:-}
      BLOCK_PRIVATE_TARGETS: ${BLOCK_PRIVATE_TARGETS:-0}
    cap_add:
      - NET_RAW
